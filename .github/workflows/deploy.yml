name: 🚀 Deploy to Staging & Production

on:
  push:
    branches:
      - develop
      - main
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  determine-environment:
    name: 🔍 Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.determine.outputs.environment }}
      deploy: ${{ steps.determine.outputs.deploy }}
    steps:
      - name: Determine deployment target
        id: determine
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/develop" ]]; then
            echo "environment=staging" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
            echo "deploy=true" >> $GITHUB_OUTPUT
          else
            echo "environment=none" >> $GITHUB_OUTPUT
            echo "deploy=false" >> $GITHUB_OUTPUT
          fi

  build-backend:
    name: 🏗️ Build Backend
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    name: 🏗️ Build Frontend
    runs-on: ubuntu-latest
    needs: determine-environment
    if: needs.determine-environment.outputs.deploy == 'true'
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci
      
      - name: Build
        working-directory: ./frontend
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 5

  deploy-staging:
    name: 📤 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [determine-environment, build-backend, build-frontend]
    if: needs.determine-environment.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.example.com
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway (Staging)
        run: |
          echo "🚀 Deploying to staging..."
          # Add your staging deployment commands here
          # Example: railway deploy --environment staging
      
      - name: Health check
        run: |
          for i in {1..5}; do
            if curl -f https://staging.example.com/api/health; then
              echo "✅ Staging health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Staging health check failed"
          exit 1
      
      - name: Notify deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployed to **Staging**\n\n🔗 https://staging.example.com'
            })

  deploy-production:
    name: 📤 Deploy to Production
    runs-on: ubuntu-latest
    needs: [determine-environment, build-backend, build-frontend]
    if: needs.determine-environment.outputs.environment == 'production'
    environment:
      name: production
      url: https://example.com
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Railway (Production)
        run: |
          echo "🚀 Deploying to production..."
          # Add your production deployment commands here
          # Example: railway deploy --environment production
      
      - name: Health check
        run: |
          for i in {1..5}; do
            if curl -f https://example.com/api/health; then
              echo "✅ Production health check passed"
              exit 0
            fi
            sleep 10
          done
          echo "❌ Production health check failed"
          exit 1
      
      - name: Notify deployment
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployed to **Production**\n\n🔗 https://example.com'
            })
