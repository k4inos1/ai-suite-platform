name: 🔍 PR Review & Quality Checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write
  pull-requests: write
  issues: write

jobs:
  lint:
    name: Application Linting & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint
        continue-on-error: true
      
      - name: TypeScript check
        run: npx tsc --noEmit
        continue-on-error: true

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  documentation:
    name: 📚 Documentation Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      
      - name: Check if README.md was modified
        id: readme
        run: |
          if git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }} | grep -q README.md; then
            echo "modified=true" >> $GITHUB_OUTPUT
          else
            echo "modified=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Check if CHANGELOG.md exists
        id: changelog
        run: test -f CHANGELOG.md && echo "exists=true" >> $GITHUB_OUTPUT || echo "exists=false" >> $GITHUB_OUTPUT
      
      - name: Comment if docs needed
        if: steps.readme.outputs.modified == 'false' && github.actor != 'dependabot[bot]'
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📚 **Documentation Reminder**: Consider updating README.md or CHANGELOG.md with your changes.'
            })

  dependencies:
    name: 📦 Dependency Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
      
      - name: Check npm dependencies
        run: npm audit --audit-level=moderate
        continue-on-error: true

  build:
    name: 🏗️ Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build

  summary:
    name: ✅ PR Summary
    runs-on: ubuntu-latest
    needs: [lint, security-scan, documentation, dependencies, build]
    if: always()
    steps:
      - uses: actions/github-script@v9
        if: github.actor != 'dependabot[bot]'
        with:
          script: |
            const statuses = {
              'lint': '${{ needs.lint.result }}',
              'security-scan': '${{ needs.security-scan.result }}',
              'documentation': '${{ needs.documentation.result }}',
              'dependencies': '${{ needs.dependencies.result }}',
              'build': '${{ needs.build.result }}'
            };
            
            let summary = '## 📋 PR Quality Summary\n\n';
            Object.entries(statuses).forEach(([job, status]) => {
              const icon = status === 'success' ? '✅' : status === 'skipped' ? '⏭️' : '❌';
              summary += `${icon} ${job}: ${status}\n`;
            });
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
